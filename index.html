<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Music Room Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-body: #f4f6f9; --bg-container: rgba(255, 255, 255, 0.7);
            --text-main: #1e293b; --text-sub: #64748b; --border-color: #e2e8f0;
            --accent-color: #6366f1; --bg-msg-me: #6366f1; --bg-msg-other: #f1f5f9;
            --glass-blur: blur(15px); --shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        body.dark-theme {
            --bg-body: #0f172a; --bg-container: rgba(30, 41, 59, 0.6);
            --text-main: #f1f5f9; --text-sub: #94a3b8; --border-color: #334155;
            --accent-color: #818cf8; --bg-msg-me: #818cf8; --bg-msg-other: #1e293b;
        }
        * { box-sizing: border-box; outline: none; }
        body {
            margin: 0; padding: 20px; font-family: 'Inter', sans-serif;
            background: var(--bg-body); color: var(--text-main);
            transition: 0.3s; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 1100px; background: var(--bg-container);
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            padding: 30px; border-radius: 24px; border: 1px solid var(--border-color);
            box-shadow: var(--shadow); display: grid; grid-template-columns: 1fr 320px; gap: 25px; position: relative;
        }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        .theme-switch { position: absolute; top: 25px; right: 25px; cursor: pointer; color: var(--accent-color); font-size: 1.4em; z-index: 10; }
        .player-container { aspect-ratio: 16/9; width: 100%; background: black; border-radius: 16px; overflow: hidden; border: 4px solid var(--border-color); }
        
        .online-box { font-size: 0.85em; margin-bottom: 15px; color: var(--text-sub); }
        .online-dot { height: 8px; width: 8px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 5px; }

        .search-area { position: relative; margin-top: 15px; }
        .search-bar { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.1); color: var(--text-main); }
        button { padding: 12px 20px; border: none; border-radius: 12px; background: var(--accent-color); color: white; font-weight: bold; cursor: pointer; }

        .results-box {
            position: absolute; top: 100%; left: 0; width: 100%; background: var(--bg-container);
            backdrop-filter: var(--glass-blur); border-radius: 12px; border: 1px solid var(--border-color); z-index: 100; display: none; max-height: 350px; overflow-y: auto;
        }
        .results-box.active { display: block; }
        .result-item { display: flex; gap: 12px; padding: 10px; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .result-item:hover { background: rgba(129, 140, 248, 0.1); }

        .sidebar-content { display: flex; flex-direction: column; gap: 20px; }
        .queue-box, .chat-area { background: rgba(0,0,0,0.05); border-radius: 16px; border: 1px solid var(--border-color); }
        .queue-box { height: 200px; overflow-y: auto; padding: 15px; }
        .chat-area { height: 400px; display: flex; flex-direction: column; overflow: hidden; }
        #chatMsgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 14px; font-size: 0.9em; position: relative; }
        .msg-time { font-size: 0.7em; opacity: 0.6; display: block; margin-top: 4px; }
        .msg.me { align-self: flex-end; background: var(--bg-msg-me); color: white; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--bg-msg-other); border-bottom-left-radius: 4px; }

        #join { position: fixed; inset: 0; background: var(--bg-body); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .join-box { background: var(--bg-container); padding: 40px; border-radius: 20px; text-align: center; width: 320px; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

<div id="join">
    <div class="join-box">
        <h2 style="margin-top:0">🎵 Listen With Me</h2>
        <input id="uNameInput" placeholder="Nhập tên..." style="width:100%; margin-bottom:15px; text-align:center;">
        <button onclick="handleJoin()" style="width:100%">Vào phòng</button>
    </div>
</div>

<div class="container">
    <div class="theme-switch" onclick="toggleTheme()"><i id="theme-icon" class="fas fa-moon"></i></div>

    <div class="main-content">
        <h1 style="margin:0; font-size:1.5em">🎵 Music Room Pro</h1>
        <div class="online-box">
            <span class="online-dot"></span> Online (<span id="userCount">0</span>): <span id="userList">Đang tải...</span>
        </div>
        
        <div class="player-container"><div id="player"></div></div>
        <div id="statusText" style="text-align:center; font-size:0.8em; color:var(--text-sub); margin:5px 0;">Sẵn sàng</div>

        <div class="search-area">
            <div class="search-bar">
                <input id="sQueryInput" placeholder="Tìm bài hoặc dán link..." onkeypress="if(event.key==='Enter')handleSearch()">
                <button onclick="handleSearch()">🔍 Tìm</button>
                <button onclick="handlePlayNow()" style="background:#10b981">▶ Phát Link</button>
            </div>
            <div id="results" class="results-box"></div>
        </div>

        <button onclick="handleSkip()" style="width:100%; background:#ef4444; margin-top:15px">⏭ Skip bài</button>
    </div>

    <div class="sidebar-content">
        <h3 style="margin:0; font-size:1em; color:var(--accent-color)">📜 HÀNG ĐỢI</h3>
        <div id="queue" class="queue-box"></div>
        
        <div class="chat-area">
            <div id="chatMsgs"></div>
            <div style="display:flex; gap:5px; padding:10px; border-top:1px solid var(--border-color)">
                <input id="mInput" placeholder="Chat..." style="flex:1" onkeypress="if(event.key==='Enter')handleSend()">
                <button onclick="handleSend()">Gửi</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    function toggleTheme() {
        document.body.classList.toggle('dark-theme');
        const isDark = document.body.classList.contains('dark-theme');
        document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-theme');
        document.getElementById('theme-icon').className = 'fas fa-sun';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Music Room</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}
.container{max-width:900px;margin:auto;padding:20px}

.player{aspect-ratio:16/9;background:black;border-radius:15px;overflow:hidden}

.search{display:flex;gap:10px;margin-top:10px}
input{flex:1;padding:10px;border-radius:10px;border:none}
button{padding:10px;border:none;border-radius:10px;background:#6366f1;color:white}

.result{display:flex;gap:10px;padding:10px;cursor:pointer}
.result:hover{background:#1e293b}
.result img{width:100px;border-radius:10px}

.queue-item{display:flex;gap:10px;margin:5px 0}
.queue-item img{width:60px;border-radius:8px}

.chat{margin-top:20px;background:#1e293b;border-radius:15px;height:300px;display:flex;flex-direction:column}
.chat-box{flex:1;overflow:auto;padding:10px}
.msg{background:#334155;padding:8px;border-radius:10px;margin-bottom:10px}
.me{background:#6366f1}

#join{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:#0f172a}
</style>
</head>

<body>

<div id="join">
    <div>
        <h2>🎵 Nhập tên</h2>
        <input id="name">
        <button onclick="join()">Vào</button>
    </div>
</div>

<div class="container">

<div id="player"></div>

<div class="search">
    <input id="search">
    <button onclick="search()">🔍</button>
</div>

<div id="results"></div>

<button onclick="skip()">⏭ Skip</button>

<h3>📜 Hàng đợi</h3>
<div id="queue"></div>

<div class="chat">
    <div id="chat" class="chat-box"></div>
    <div style="display:flex;gap:10px;padding:10px">
        <input id="msg" onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()">Gửi</button>
    </div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>

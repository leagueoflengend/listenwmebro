<div id="joinModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1b26; z-index: 9999; display: flex; align-items: center; justify-content: center;">
    <div style="background: #24283b; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <h2 style="color: #7aa2f7; margin-top: 0;">Chào mừng bạn!</h2>
        <p style="color: #a9b1d6;">Vui lòng nhập tên để tham gia nghe nhạc:</p>
        <input type="text" id="joinNameInput" placeholder="Tên của bạn..." style="width: 80%; padding: 12px; border-radius: 6px; border: 1px solid #414868; background: #1a1b26; color: #fff; margin-bottom: 20px; outline: none;">
        <br>
        <button onclick="joinRoom()" style="width: 80%; padding: 12px; background: #9ece6a; color: #1a1b26; font-weight: bold; border: none; border-radius: 6px; cursor: pointer;">Vào phòng ngay</button>
    </div>
</div>

<div class="online-status">
    <span class="dot"></span> Đang online (<span id="userCount">0</span>): 
    <div id="userList" style="display: inline-flex; gap: 5px; flex-wrap: wrap; font-weight: bold; color: #9ece6a;"></div>
</div>

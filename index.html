<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Music Room Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #f4f6f9; --card: rgba(255, 255, 255, 0.9); --text: #1e293b; --sub: #64748b;
            --border: #e2e8f0; --accent: #6366f1; --msg-me: #6366f1; --msg-other: #f1f5f9;
        }
        body.dark-theme {
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.9); --text: #f1f5f9; --sub: #94a3b8;
            --border: #334155; --accent: #818cf8; --msg-me: #818cf8; --msg-other: #1e293b;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            display: flex; justify-content: center; min-height: 100vh; padding: 20px; transition: 0.3s;
        }
        .container {
            width: 100%; max-width: 1100px; background: var(--card); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: grid; grid-template-columns: 1fr 350px; gap: 25px; position: relative;
        }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        .theme-switch { position: absolute; top: 25px; right: 25px; cursor: pointer; color: var(--accent); font-size: 1.5rem; }
        .player-box { aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; border: 3px solid var(--border); }
        #player { width: 100%; height: 100%; }

        .search-area { margin-top: 20px; position: relative; }
        .search-bar { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        button { padding: 12px 20px; border: none; border-radius: 12px; background: var(--accent); color: #fff; font-weight: bold; cursor: pointer; }
        
        .results-box {
            position: absolute; top: 100%; left: 0; width: 100%; background: var(--card);
            border: 1px solid var(--border); border-radius: 12px; z-index: 100; display: none; max-height: 300px; overflow-y: auto;
        }
        .results-box.active { display: block; }
        .result-item { display: flex; gap: 15px; padding: 10px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .result-item:hover { background: rgba(129, 140, 248, 0.1); }
        .result-item img { width: 80px; border-radius: 8px; }

        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .list-box { background: rgba(0,0,0,0.03); border-radius: 16px; padding: 15px; height: 300px; overflow-y: auto; border: 1px solid var(--border); }
        .queue-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .queue-item img { width: 50px; border-radius: 4px; }

        .chat-box { background: rgba(0,0,0,0.03); border-radius: 16px; height: 400px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); }
        #chatMessages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--msg-me); color: #fff; }
        .msg.other { align-self: flex-start; background: var(--msg-other); color: var(--text); }

        #join { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .join-card { background: var(--card); padding: 40px; border-radius: 24px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="join">
    <div class="join-card">
        <h2>🎵 Music Room Pro</h2>
        <input id="userNameInput" placeholder="Nhập tên của bạn..." style="width:100%; margin-bottom:15px;" onkeypress="if(event.key==='Enter')joinRoom()">
        <button onclick="joinRoom()" style="width:100%">Tham gia</button>
    </div>
</div>

<div class="container">
    <div class="theme-switch" onclick="toggleTheme()"><i id="theme-icon" class="fas fa-moon"></i></div>

    <div class="main-content">
        <div class="player-box"><div id="player"></div></div>
        <div id="statusText" style="text-align:center; margin:10px; font-size:0.8rem; color:var(--sub)">Sẵn sàng</div>
        
        <div class="search-area">
            <div class="search-bar">
                <input id="searchInputField" placeholder="Tìm tên bài hoặc dán link YouTube..." onkeypress="if(event.key==='Enter')searchSong()">
                <button onclick="searchSong()">🔍 Tìm</button>
            </div>
            <div id="results" class="results-box"></div>
        </div>

        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="playNow()" style="flex:1">▶ Phát Link</button>
            <button onclick="skip()" style="background:#ef4444; flex:1">⏭ Skip</button>
        </div>
    </div>

    <div class="sidebar">
        <h3>📜 Hàng đợi</h3>
        <div id="queue" class="list-box"></div>

        <h3>💬 Chat</h3>
        <div class="chat-box">
            <div id="chatMessages"></div>
            <div style="display:flex; gap:5px; padding:10px; border-top:1px solid var(--border)">
                <input id="msgInput" placeholder="Nhắn tin..." onkeypress="if(event.key==='Enter')send()">
                <button onclick="send()">Gửi</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

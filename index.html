<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎵 Listen Room</title>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
:root {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --sub: #64748b;
    --accent: #6366f1;
}

body.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --sub: #94a3b8;
    --accent: #818cf8;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* ===== LOGIN ===== */
#joinModal {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.25);
}

.modal {
    width: 340px;
    background: var(--card);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}

.modal h2 {
    margin: 0;
}

.modal input {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--bg);
    font-size: 15px;
    color: var(--text);
}

.modal button {
    margin-top: 15px;
    width: 100%;
}

/* ===== MAIN ===== */
.container {
    max-width: 720px;
    margin: auto;
    padding: 20px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header h2 {
    margin: 0;
}

.theme-btn {
    font-size: 20px;
    cursor: pointer;
}

/* INPUT ROW */
.controls {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.controls input {
    flex: 1;
}

/* INPUT + BUTTON */
input {
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--card);
    color: var(--text);
    font-size: 15px;
}

button {
    padding: 14px 18px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* PLAYER */
.player-box {
    margin-top: 20px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}

/* SEARCH */
.search-results {
    margin-top: 10px;
    background: var(--card);
    border-radius: 12px;
    overflow: hidden;
}

.search-item {
    display: flex;
    gap: 10px;
    padding: 10px;
    cursor: pointer;
}

.search-item:hover {
    background: var(--bg);
}

/* PLAYLIST */
.playlist {
    margin-top: 20px;
    background: var(--card);
    padding: 15px;
    border-radius: 16px;
}

/* CHAT */
.chat {
    margin-top: 20px;
    background: var(--card);
    padding: 15px;
    border-radius: 16px;
}

.chat-box {
    height: 130px;
    overflow-y: auto;
    margin-bottom: 10px;
}

/* BUTTON ROW */
.actions {
    margin-top: 15px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="joinModal">
    <div class="modal">
        <h2>🎵 Listen Together</h2>
        <input id="joinNameInput" placeholder="Nhập tên của bạn...">
        <button onclick="joinRoom()">Vào phòng</button>
    </div>
</div>

<div class="container">

    <div class="header">
        <h2>🎵 Listen Room</h2>
        <div class="theme-btn" onclick="toggleTheme()">🌙</div>
    </div>

    <p>👥 <span id="userCount">0</span> người</p>

    <div class="controls">
        <input id="youtubeLink" placeholder="Tìm bài hoặc dán link...">
        <button onclick="searchSong()">🔍</button>
        <button onclick="playNow()">▶</button>
    </div>

    <div id="searchResultsBox" class="search-results"></div>

    <div class="player-box">
        <div id="player"></div>
    </div>

    <div class="actions">
        <button onclick="skipVideo()">⏭️ Skip</button>
    </div>

    <div class="playlist">
        <b>📜 Hàng chờ</b>
        <ul id="playlistUI"></ul>
    </div>

    <div class="chat">
        <div id="chatMessages" class="chat-box"></div>

        <div class="controls">
            <input id="chatInput" placeholder="Nhắn tin..."
                onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Gửi</button>
        </div>
    </div>

</div>

<script src="script.js"></script>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>

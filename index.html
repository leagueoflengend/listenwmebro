<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎵 Listen Room</title>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
:root {
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #0f172a;
    --sub: #64748b;
    --accent: #6366f1;
}

body.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --sub: #94a3b8;
    --accent: #818cf8;
}

body {
    margin: 0;
    font-family: system-ui;
    background: var(--bg);
    color: var(--text);
}

/* LOGIN */
#joinModal {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.3);
}

.modal {
    width: 320px;
    background: var(--card);
    padding: 25px;
    border-radius: 16px;
    text-align: center;
}

.modal input {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: var(--bg);
}

/* MAIN */
.container {
    max-width: 760px;
    margin: auto;
    padding: 20px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* INPUT */
.controls {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 16px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    cursor: pointer;
}

/* PLAYER FIX */
.player-box {
    margin-top: 15px;
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: black;
    border-radius: 12px;
    overflow: hidden;
}

#player {
    width: 100% !important;
    height: 100% !important;
}

/* CHAT */
.chat {
    margin-top: 20px;
    background: var(--card);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    height: 260px;
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.chat-item {
    max-width: 75%;
    padding: 10px;
    border-radius: 12px;
    margin-bottom: 10px;
    background: var(--bg);
}

.chat-item.me {
    margin-left: auto;
    background: var(--accent);
    color: white;
}

.chat-header {
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    margin-bottom: 3px;
}

.chat-input {
    display: flex;
    gap: 10px;
    padding: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="joinModal">
    <div class="modal">
        <h3>🎵 Nhập tên</h3>
        <input id="joinNameInput">
        <button onclick="joinRoom()">Vào phòng</button>
    </div>
</div>

<div class="container">

<div class="header">
    <h2>🎵 Listen Room</h2>
    <button onclick="toggleTheme()">🌙</button>
</div>

<p>👥 <span id="userCount">0</span></p>

<div class="controls">
    <input id="youtubeLink" placeholder="Tìm bài...">
    <button onclick="searchSong()">🔍</button>
</div>

<div id="searchResultsBox"></div>

<div class="player-box">
    <div id="player"></div>
</div>

<div class="chat">
    <div id="chatMessages" class="chat-box"></div>

    <div class="chat-input">
        <input id="chatInput"
            onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Gửi</button>
    </div>
</div>

</div>

<script src="script.js"></script>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>

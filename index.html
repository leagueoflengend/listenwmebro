<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎵</title>

<script src="/socket.io/socket.io.js"></script>

<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:system-ui;
    background:#0f172a;
    color:white;
}

/* ===== LOGIN ===== */
#join{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    z-index:999;
}

.join-box{
    background:#1e293b;
    padding:30px;
    border-radius:16px;
    width:300px;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:10px;
}

button{
    padding:10px;
    border:none;
    border-radius:10px;
    background:#6366f1;
    color:white;
    cursor:pointer;
}

/* ===== MAIN ===== */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* PLAYER */
.player{
    aspect-ratio:16/9;
    background:black;
    border-radius:16px;
    overflow:hidden;
}

#player{width:100%;height:100%}

/* SEARCH */
.search{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.results{
    margin-top:10px;
}

.result{
    display:flex;
    gap:10px;
    padding:8px;
    border-radius:10px;
    cursor:pointer;
}

.result:hover{background:#1e293b}

.result img{
    width:100px;
    border-radius:8px;
}

/* CHAT */
.chat{
    margin-top:20px;
    background:#1e293b;
    border-radius:16px;
    display:flex;
    flex-direction:column;
    height:300px;
}

.chat-box{
    flex:1;
    overflow:auto;
    padding:10px;
}

.msg{
    background:#334155;
    padding:8px;
    border-radius:10px;
    margin-bottom:10px;
}

.me{background:#6366f1}

.chat-input{
    display:flex;
    gap:10px;
    padding:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="join">
    <div class="join-box">
        <h2>🎵 Dô!!</h2>
        <input id="name" placeholder="Tên...">
        <button onclick="join()">Vào</button>
    </div>
</div>

<div class="container">

<div class="player"><div id="player"></div></div>

<div class="search">
    <input id="search" placeholder="Tìm bài...">
    <button onclick="search()">🔍</button>
</div>

<div id="results" class="results"></div>

<div class="chat">
    <div id="chat" class="chat-box"></div>
    <div class="chat-input">
        <input id="msg" placeholder="Nhắn tin..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Gửi</button>
    </div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>

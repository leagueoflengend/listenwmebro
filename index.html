<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listen With Me 🎵</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ĐỊNH NGHĨA BIẾN MÀU SẮC */
        :root {
            --bg-color: #f0f2f5;          /* Nền sáng nhẹ */
            --container-bg: #ffffff;     /* Container trắng tinh */
            --text-color: #1a1b26;       /* Chữ đen đậm */
            --sub-text: #565f89;         /* Chữ phụ xám */
            --border-color: #e1e4e8;     /* Viền nhẹ */
            --input-bg: #fdfdfd;
            --accent-color: #7aa2f7;     /* Xanh chủ đạo */
            --playlist-bg: #f8f9fa;
        }

        /* KHI BẬT DARK MODE (Thêm class .dark-theme vào body) */
        body.dark-theme {
            --bg-color: #1a1b26;
            --container-bg: #24283b;
            --text-color: #a9b1d6;
            --sub-text: #565f89;
            --border-color: #414868;
            --input-bg: #1a1b26;
            --accent-color: #7aa2f7;
            --playlist-bg: #1f2335;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
            transition: background 0.3s, color 0.3s;
        }

        .container { 
            background-color: var(--container-bg); 
            padding: 25px; border-radius: 12px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.1); 
            text-align: center; width: 100%; max-width: 650px; position: relative;
        }

        /* NÚT TOGGLE DARK MODE */
        .theme-switch {
            position: absolute; top: 15px; right: 15px;
            cursor: pointer; font-size: 1.2em; color: var(--accent-color);
        }

        h1 { color: var(--accent-color); margin: 0 0 5px 0; }
        .online-status { font-size: 0.85em; margin-bottom: 15px; color: var(--sub-text); }
        .dot { height: 8px; width: 8px; background-color: #9ece6a; border-radius: 50%; display: inline-block; margin-right: 5px; }

        .controls { margin: 10px 0; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;}
        input[type="text"] { 
            flex-grow: 1; padding: 10px; border-radius: 6px; 
            border: 1px solid var(--border-color); 
            background-color: var(--input-bg); color: var(--text-color); outline: none; 
        }

        button { padding: 10px 15px; border: none; border-radius: 6px; background-color: var(--accent-color); color: white; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .btn-search { background-color: #9ece6a; color: #1a1b26; }
        .btn-danger { background-color: #f7768e; }
        .btn-secondary { background-color: #bb9af7; }

        /* KẾT QUẢ TÌM KIẾM */
        .search-results { 
            position: absolute; top: 120px; left: 5%; width: 90%; 
            background: var(--container-bg); border: 1px solid var(--border-color); 
            border-radius: 8px; z-index: 100; display: none; max-height: 400px; overflow-y: auto; 
            padding: 10px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .search-item { display: flex; gap: 10px; padding: 10px; border-bottom: 1px solid var(--border-color); }
        .search-item img { width: 100px; border-radius: 4px; }
        .search-title { color: var(--accent-color); font-weight: bold; font-size: 0.9em; }

        /* PLAYLIST & CHAT */
        .playlist-box, .chat-container { 
            margin-top: 20px; text-align: left; 
            background: var(--playlist-bg); padding: 15px; border-radius: 8px;
        }
        .chat-messages { height: 120px; overflow-y: auto; background: var(--input-bg); padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); margin: 10px 0;}

        /* MODAL NHẬP TÊN */
        #joinModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; align-items: center; justify-content: center; }

        .footer { margin-top: 30px; border-top: 1px solid var(--border-color); padding-top: 15px; }
    </style>
</head>
<body class=""> <div id="joinModal">
        <div style="background: var(--container-bg); padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <h2 style="color: var(--accent-color);">Listen With Me 🎵</h2>
            <input type="text" id="joinNameInput" placeholder="Nhập tên của bạn..." style="width: 250px; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color);">
            <br><br>
            <button onclick="joinRoom()" style="width: 100%;">Vào phòng ngay</button>
        </div>
    </div>

    <div class="container">
        <div class="theme-switch" onclick="toggleTheme()" title="Đổi giao diện">
            <i id="theme-icon" class="fas fa-moon"></i>
        </div>

        <h1>🎵 Listen With Me</h1>
        <div class="online-status">
            <span class="dot"></span> Online (<span id="userCount">0</span>): 
            <div id="userList" style="display: inline-flex; gap: 5px; flex-wrap: wrap;"></div>
        </div>
        
        <div class="controls">
            <input type="text" id="youtubeLink" placeholder="Tìm bài hát hoặc dán link...">
            <button onclick="searchSong()" class="btn-search">🔍 Tìm kiếm</button>
            <button onclick="playNow()">Phát Link</button>
        </div>

        <div id="searchResultsBox" class="search-results"></div>

        <div id="youtubePlayerContainer"><div id="player"></div></div>
        
        <div class="controls">
            <button onclick="skipVideo()" class="btn-danger" style="flex:1">⏭️ Chuyển bài</button>
            <button onclick="addToList()" class="btn-secondary">+ Hàng Đợi</button>
        </div>

        <div class="playlist-box">
            <h3>Danh sách chờ:</h3>
            <ul id="playlistUI"></ul>
        </div>

        <div class="chat-container">
            <div id="chatMessages" class="chat-messages"></div>
            <div class="controls">
                <input type="text" id="chatInput" placeholder="Nhập tin nhắn..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Gửi</button>
            </div>
        </div>

        <div class="footer">
            <a href="https://facebook.com/your-profile" target="_blank" class="fb-link">
                <i class="fab fa-facebook"></i> Facebook Admin
            </a>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>🎵 </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #f4f6f9; --glass: rgba(255, 255, 255, 0.7); --text: #1e293b; --sub: #64748b;
            --border: #e2e8f0; --accent: #6366f1; --msg-me: #6366f1; --msg-other: #f1f5f9;
            --blur: blur(15px);
        }
        body.dark-theme {
            --bg: #0f172a; --glass: rgba(30, 41, 59, 0.6); --text: #f1f5f9; --sub: #94a3b8;
            --border: #334155; --accent: #818cf8; --msg-me: #818cf8; --msg-other: #1e293b;
        }
        * { box-sizing: border-box; outline: none; }
        body {
            margin: 0; padding: 20px; font-family: sans-serif; background: var(--bg); color: var(--text);
            transition: 0.3s; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 1100px; background: var(--glass); backdrop-filter: var(--blur);
            padding: 25px; border-radius: 20px; border: 1px solid var(--border);
            display: grid; grid-template-columns: 1fr 320px; gap: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); position: relative;
        }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
        .theme-switch { position: absolute; top: 20px; right: 20px; cursor: pointer; color: var(--accent); font-size: 1.4em; z-index: 10; }
        .player-container { aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid var(--border); }
        .online-info { font-size: 0.85em; margin-bottom: 10px; color: #10b981; font-weight: bold; }
        .search-area { position: relative; margin-top: 15px; }
        .search-bar { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.1); color: inherit; }
        button { padding: 10px 20px; border: none; border-radius: 10px; background: var(--accent); color: #fff; cursor: pointer; font-weight: bold; }
        .results-box { position: absolute; width: 100%; background: var(--glass); backdrop-filter: blur(20px); border-radius: 10px; z-index: 100; display: none; max-height: 300px; overflow-y: auto; top: 100%; border: 1px solid var(--border); }
        .results-box.active { display: block; }
        .result-item { display: flex; gap: 10px; padding: 10px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .queue-box, .chat-area { background: rgba(0,0,0,0.1); border-radius: 12px; border: 1px solid var(--border); }
        .queue-box { height: 200px; overflow-y: auto; padding: 10px; margin-bottom: 15px; }
        .chat-area { height: 380px; display: flex; flex-direction: column; overflow: hidden; }
        #chatMsgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 0.9em; position: relative; }
        .msg-time { font-size: 0.7em; opacity: 0.5; display: block; margin-top: 4px; }
        .msg.me { align-self: flex-end; background: var(--msg-me); color: white; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
        #join { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .join-box { background: var(--glass); padding: 40px; border-radius: 20px; text-align: center; width: 320px; border: 1px solid var(--border); }
        .q-btn { cursor: pointer; padding: 5px; transition: 0.2s; }
        .q-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body>
    <div id="join">
        <div class="join-box">
            <h2 style="margin-top:0">🎵</h2>
            <input id="uNameInput" placeholder="Tên" onkeypress="if(event.key==='Enter') handleJoinClick()">
            <button id="btnJoin" onclick="handleJoinClick()" style="width:100%; margin-top:10px;">Dô</button>
        </div>
    </div>
    <div class="container">
        <div class="theme-switch" onclick="toggleTheme()"><i id="theme-icon" class="fas fa-moon"></i></div>
        <div class="main">
            <div class="online-info">🟢 Online (<span id="uCount">0</span>): <span id="uList">...</span></div>
            <div class="player-container"><div id="player"></div></div>
            <div class="search-area">
                <div class="search-bar">
                    <input id="sQueryInput" placeholder="Tìm tên bài hoặc dán link..." onkeypress="if(event.key==='Enter') handleSearchClick()">
                    <button id="btnSearch" onclick="handleSearchClick()">Tìm bài</button>
                    <button id="btnLink" onclick="handleLinkClick()" style="background:#10b981">Thêm Link</button>
                </div>
                <div id="results" class="results-box"></div>
            </div>
            <button onclick="handleSkipClick()" style="width:100%; background:#ef4444; margin-top:10px">⏭ Skip bài</button>
        </div>
        <div class="sidebar">
            <h3 style="margin: 0 0 10px 0; font-size: 1em; color: var(--accent);">📜 HÀNG ĐỢI</h3>
            <div id="qBox" class="queue-box"></div>
            <div class="chat-area">
                <div id="chatMsgs"></div>
                <div style="display:flex; gap:5px; padding:10px; border-top:1px solid var(--border)">
                    <input id="mChatInput" placeholder="Chat..." onkeypress="if(event.key==='Enter') handleChatClick()">
                    <button id="btnChat" onclick="handleChatClick()">Gửi</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

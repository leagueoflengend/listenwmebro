<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

/* LOGIN */
#joinModal {
    position: fixed;
    inset: 0;
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
}

.modal-content {
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.modal-content input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #0f172a;
    color: white;
    margin-bottom: 15px;
}

.modal-content button {
    width: 100%;
    padding: 12px;
    background: #3b82f6;
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: bold;
}

/* MAIN */
.container {
    max-width: 700px;
    margin: auto;
}

.controls {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #1e293b;
    color: white;
}

button {
    background: #3b82f6;
    border: none;
    padding: 10px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

.search-item {
    display: flex;
    gap: 10px;
    padding: 10px;
    cursor: pointer;
}

.search-item:hover {
    background: #1e293b;
}
</style>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Music Room Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="/socket.io/socket.io.js"></script>

    <style>
        /* --- ĐỊNH NGHĨA BIẾN MÀU SẮC (THEME) --- */
        :root {
            /* Light Mode (Mặc định) */
            --bg-body: #f4f6f9;
            --bg-container: rgba(255, 255, 255, 0.9);
            --bg-glass: rgba(255, 255, 255, 0.2);
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
            --accent-color: #6366f1; /* Tím Indigo */
            --accent-hover: #4f46e5;
            --bg-msg-me: #6366f1;
            --text-msg-me: #ffffff;
            --bg-msg-other: #f1f5f9;
            --shadow-card: 0 10px 30px rgba(0,0,0,0.05);
            --glass-blur: blur(10px);
        }

        /* Dark Mode (Thêm class .dark-theme vào <body>) */
        body.dark-theme {
            --bg-body: #0f172a;
            --bg-container: rgba(30, 41, 59, 0.9);
            --bg-glass: rgba(255, 255, 255, 0.05);
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border-color: #334155;
            --accent-color: #818cf8;
            --accent-hover: #a5b4fc;
            --bg-msg-me: #818cf8;
            --text-msg-me: #0f172a;
            --bg-msg-other: #1e293b;
            --shadow-card: 0 10px 40px rgba(0,0,0,0.3);
        }

        /* --- CĂN CHỈNH TOÀN CỤC (RESET & BODY) --- */
        * { box-sizing: border-box; outline: none; }
        
        body {
            margin: 0; padding: 20px;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            transition: background 0.4s, color 0.4s;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* --- CONTAINER CHÍNH --- */
        .container {
            width: 100%; max-width: 1000px;
            background: var(--bg-container);
            backdrop-filter: var(--glass-blur);
            padding: 30px; border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            position: relative;
            /* Sử dụng Grid để chia bố cục: Bên trái nhạc, bên phải Chat/Queue */
            display: grid; grid-template-columns: 1fr 320px; gap: 25px;
        }

        /* Mobile adaptation */
        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; padding: 20px; }
            .theme-switch { top: 15px !important; right: 15px !important; }
        }

        /* --- NÚT BẬT/TẮT DARKMODE --- */
        .theme-switch {
            position: absolute; top: 25px; right: 25px;
            font-size: 1.4em; cursor: pointer;
            color: var(--accent-color);
            transition: transform 0.3s ease;
            z-index: 10;
        }
        .theme-switch:hover { transform: scale(1.1); }

        /* --- KHU VỰC TRÁI (NHẠC & TÌM KIẾM) --- */
        .main-content { display: flex; flex-direction: column; gap: 20px; }

        /* YouTube Player */
        .player-container {
            aspect-ratio: 16/9; width: 100%;
            background: black; border-radius: 16px;
            overflow: hidden; border: 4px solid var(--border-color);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        #player { width: 100%; height: 100%; }

        /* Khu vực Tìm kiếm */
        .search-area { position: relative; }
        .search-bar { display: flex; gap: 10px; }
        
        input {
            flex: 1; padding: 12px 15px;
            border-radius: 12px; border: 1px solid var(--border-color);
            background: var(--bg-body); color: var(--text-main);
            font-size: 1em; transition: 0.3s;
        }
        input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

        button {
            padding: 12px 20px; border: none; border-radius: 12px;
            background: var(--accent-color); color: white;
            font-weight: bold; cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        button:hover { background: var(--accent-hover); }
        button:active { transform: scale(0.98); }

        /* Kết quả tìm kiếm (Dropdown) */
        .results-box {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: var(--bg-container); border-radius: 12px;
            margin-top: 8px; border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            z-index: 20; max-height: 400px; overflow-y: auto; display: none;
        }
        .results-box.active { display: block; }
        
        .result-item {
            display: flex; gap: 15px; padding: 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer; transition: 0.2s;
        }
        .result-item:last-child { border-bottom: none; }
        .result-item:hover { background: var(--inner); }
        
        .result-item img { width: 100px; height: 56px; object-fit: cover; border-radius: 8px; }
        .result-title { font-size: 0.9em; font-weight: 500; color: var(--text-main); }
        .result-author { font-size: 0.8em; color: var(--text-sub); }

        /* Trạng thái */
        #statusText { font-size: 0.85em; color: var(--text-sub); text-align: center; }

        /* Nút phụ */
        .action-btns { display: flex; gap: 10px; margin-top: -10px; }
        .btn-skip { background: #ef4444; }
        .btn-skip:hover { background: #dc2626; }

        /* --- KHU VỰC PHẢI (HÀNG ĐỢI & CHAT) --- */
        .sidebar-content { display: flex; flex-direction: column; gap: 20px; }

        h3 { margin: 0; color: var(--accent-color); font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; }

        /* Hàng đợi */
        .queue-box {
            background: var(--bg-glass); padding: 15px; border-radius: 16px;
            border: 1px solid var(--border-color);
            height: 250px; overflow-y: auto;
        }
        .queue-item {
            display: flex; gap: 10px; align-items: center;
            padding: 8px; border-bottom: 1px solid var(--border-color);
        }
        .queue-item:last-child { border-bottom: none; }
        .queue-item img { width: 60px; height: 34px; object-fit: cover; border-radius: 6px; }
        .queue-title { flex: 1; font-size: 0.85em; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Khu vực Chat */
        .chat-area {
            background: var(--bg-glass); border-radius: 16px;
            border: 1px solid var(--border-color);
            height: 350px; display: flex; flex-direction: column;
            overflow: hidden;
        }
        .chat-header { padding: 10px 15px; border-bottom: 1px solid var(--border-color); }
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        /* Tin nhắn chat */
        .msg {
            max-width: 80%; padding: 8px 12px;
            border-radius: 12px; font-size: 0.9em;
            word-wrap: break-word; position: relative;
        }
        .msg-sender { font-weight: bold; font-size: 0.8em; margin-bottom: 3px; display: block; color: var(--text-sub); }
        
        .msg.other { align-self: flex-start; background: var(--bg-msg-other); color: var(--text-main); border-bottom-left-radius: 4px; }
        .msg.me { align-self: flex-end; background: var(--bg-msg-me); color: var(--text-msg-me); border-bottom-right-radius: 4px; }
        .msg.me .msg-sender { color: rgba(255,255,255,0.7); } /* Gửi bởi tôi */

        .chat-input { display: flex; gap: 8px; padding: 10px; border-top: 1px solid var(--border-color); background: var(--bg-container); }

        /* --- OVERLAY NHẬP TÊN --- */
        #join {
            position: fixed; inset: 0; background: var(--bg-body);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; transition: 0.5s;
        }
        .join-box {
            background: var(--bg-container); padding: 40px; border-radius: 20px;
            text-align: center; box-shadow: var(--shadow-card);
            border: 1px solid var(--border-color); width: 320px;
        }
        .join-box h2 { color: var(--accent-color); margin-top: 0; }
        .join-box input { width: 100%; margin-bottom: 20px; text-align: center; }
        .join-box button { width: 100%; }
        #join.fade-out { opacity: 0; visibility: hidden; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }
    </style>
</head>

<body>

<div id="join">
    <div class="join-box">
        <h2>🎵 Welcome to Music Room Pro</h2>
        <p style="color:var(--text-sub); font-size:0.9em">Nhập tên của bạn để tham gia</p>
        <input id="name" placeholder="Tên của bạn..." onkeypress="if(event.key==='Enter')join()">
        <button onclick="join()">Vào phòng ngay</button>
    </div>
</div>

<div class="container">
    <div class="theme-switch" onclick="toggleTheme()" title="Đổi giao diện">
        <i id="theme-icon" class="fas fa-moon"></i>
    </div>

    <div class="main-content">
        <h1 style="margin:0; font-size:1.5em">🎵 Music Room Pro</h1>
        
        <div class="player-container">
            <div id="player"></div>
        </div>

        <div id="statusText">Đang tải nhạc...</div>

        <div class="search-area">
            <div class="search-bar">
                <input id="search" placeholder="Tìm tên bài hát hoặc dán link YouTube..." onkeypress="if(event.key==='Enter')search()">
                <button onclick="search()">🔍 Tìm kiếm</button>
            </div>
            <div id="results" class="results-box"></div>
        </div>

        <div class="action-btns">
            <button onclick="playNow()">▶ Phát Link</button>
            <button onclick="addToList()" class="btn-skip" style="background:#bb9af7;">+ Đợi</button>
            <button onclick="skip()" class="btn-skip">⏭ Skip bài</button>
        </div>
    </div>

    <div class="sidebar-content">
        <div>
            <h3>📜 Hàng đợi</h3>
            <div id="queue" class="queue-box">
                <p style="color:var(--text-sub); text-align:center; font-size:0.8em; margin-top:100px;">Trống...</p>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header"><h3>💬 Trò chuyện</h3></div>
            <div id="chatMessages" class="chat-box"></div>
            <div class="chat-input">
                <input id="msg" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter')send()">
                <button onclick="send()">Gửi</button>
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>

<script>
    // --- SỬA LỖI LOGIC UI VÀ THEME MODE ---

    // 1. Quản lý Dark Mode
    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('theme-icon');
        body.classList.toggle('dark-theme');
        
        if (body.classList.contains('dark-theme')) {
            icon.className = 'fas fa-sun';
            localStorage.setItem('theme', 'dark');
        } else {
            icon.className = 'fas fa-moon';
            localStorage.setItem('theme', 'light');
        }
    }

    // Kiểm tra theme đã lưu khi vừa tải trang
    (function() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
            if(document.getElementById('theme-icon')) document.getElementById('theme-icon').className = 'fas fa-sun';
        }
    })();

    // 2. Logic khi click ra ngoài kết quả tìm kiếm thì ẩn nó đi
    window.addEventListener('click', function(e) {
        const resultsBox = document.getElementById('results');
        const searchInput = document.getElementById('search');
        if (!resultsBox.contains(e.target) && e.target !== searchInput) {
            resultsBox.classList.remove('active');
        }
    });

    // Sửa lại hàm join() để có hiệu ứng mượt
    const oldJoin = join;
    join = function() {
        const name = document.getElementById('name').value.trim();
        if(!name) return alert("Bạn chưa nhập tên mà!");
        oldJoin(); // Gọi hàm gốc của bạn
        document.getElementById('join').classList.add('fade-out');
        // Đồng bộ tên xuống ô chat cho tiện
        localStorage.setItem('nickname', name);
    }
    
    // Sửa hàm search() để hiện kết quả Dropdown
    const oldSearch = search;
    search = function() {
        const q = document.getElementById('search').value.trim();
        if(!q) return;
        oldSearch(); // Gọi hàm gốc của bạn
        document.getElementById('results').classList.add('active');
        document.getElementById('results').innerHTML = '<p style="text-align:center; padding:20px; color:var(--text-sub);">Đang tìm...</p>';
    }

    // Gắn event để tắt tìm kiếm khi click vào 1 bài
    // Bạn cần sửa trong script.js, khi render kết quả tìm kiếm, hãy thêm class 'result-item' 
    // và khi click thì gọi `document.getElementById('results').classList.remove('active');`

</script>

</body>
</html>

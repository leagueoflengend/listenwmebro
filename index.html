<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎵 Room</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body { font-family: system-ui; margin:0; background:#0f172a; color:white; }

.container { max-width:700px; margin:auto; padding:20px; }

.player {
    aspect-ratio:16/9;
    background:black;
    border-radius:12px;
    overflow:hidden;
}

#player { width:100%; height:100%; }

.controls { display:flex; gap:10px; margin-top:10px; }

input { flex:1; padding:10px; border-radius:8px; border:none; }

button { padding:10px; border:none; border-radius:8px; background:#6366f1; color:white; }

.chat {
    margin-top:20px;
    background:#1e293b;
    border-radius:10px;
    height:250px;
    display:flex;
    flex-direction:column;
}

.chat-box {
    flex:1;
    overflow:auto;
    padding:10px;
}

.msg {
    margin-bottom:10px;
    padding:8px;
    border-radius:8px;
    background:#334155;
}

.me { background:#6366f1; }

.chat-input {
    display:flex;
    gap:10px;
    padding:10px;
}
</style>
</head>

<body>

<div id="join">
    <input id="name" placeholder="Tên...">
    <button onclick="join()">Vào</button>
</div>

<div class="container">

<div class="player"><div id="player"></div></div>

<div class="controls">
    <input id="search" placeholder="Tìm bài">
    <button onclick="search()">🔍</button>
</div>

<div id="results"></div>

<div class="chat">
    <div id="chat" class="chat-box"></div>
    <div class="chat-input">
        <input id="msg" onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Gửi</button>
    </div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>

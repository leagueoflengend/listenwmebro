<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Listen With Me</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0f172a; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        input, button { padding: 10px; border-radius: 8px; border: none; margin: 5px 0; }
        button { background: #6366f1; color: #fff; cursor: pointer; font-weight: bold; }
        .player-box { aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        #results { background: #1e293b; border-radius: 8px; margin-top: 5px; max-height: 200px; overflow-y: auto; }
        .res-item { display: flex; gap: 10px; padding: 10px; cursor: pointer; border-bottom: 1px solid #334155; }
        .chat-box { height: 300px; background: #1e293b; border-radius: 12px; display: flex; flex-direction: column; }
        #chatMsgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.9rem; }
        #join { position: fixed; inset: 0; background: #0f172a; z-index: 100; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="join">
    <div style="text-align:center">
        <h2>🎵 Nhập tên</h2>
        <input id="userName" placeholder="Tên bạn...">
        <button onclick="handleJoin()">Vào phòng</button>
    </div>
</div>

<div class="container">
    <div class="main">
        <div class="player-box"><div id="player"></div></div>
        <div style="display:flex; gap:10px; margin-top:10px">
            <input id="searchInp" style="flex:1" placeholder="Tìm bài hát...">
            <button onclick="handleSearch()">Tìm</button>
        </div>
        <div id="results"></div>
        <button onclick="handleSkip()" style="width:100%; background:#ef4444; margin-top:10px">⏭ Skip bài</button>
        <h3>Hàng đợi</h3>
        <div id="queueBox"></div>
    </div>
    <div class="sidebar">
        <div class="chat-box">
            <div id="chatMsgs"></div>
            <div style="padding:10px; display:flex; gap:5px">
                <input id="msgInp" style="flex:1" placeholder="Chat...">
                <button onclick="handleSend()">Gửi</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
